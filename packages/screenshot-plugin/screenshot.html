<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
      overflow: hidden;
      outline: none;
      background: transparent;
      user-select: none;
    }
    body {
      tab-index: -1;
    }
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
      background: transparent;
    }
    #selection {
      position: fixed;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(0, 0, 0, 0.5);
      background: transparent;
      z-index: 9999;
      display: none;
    }
    #selection.show {
      display: block;
    }
    #selection.resizing {
      /* Cursor is set per resize-handle */
    }
    #selection-dimensions {
      position: fixed;
      padding: 4px 8px;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      font-family: monospace;
      font-size: 12px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 10000;
      display: none;
    }
    #selection-dimensions.show {
      display: block;
    }
    .resize-handle {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #fff;
      border: 1px solid #333;
      border-radius: 2px;
      pointer-events: auto;
    }
    .resize-handle.nw { top: -6px; left: -6px; cursor: nwse-resize; }
    .resize-handle.ne { top: -6px; right: -6px; cursor: nesw-resize; }
    .resize-handle.sw { bottom: -6px; left: -6px; cursor: nesw-resize; }
    .resize-handle.se { bottom: -6px; right: -6px; cursor: nwse-resize; }
    .resize-handle.n { top: -6px; left: 50%; transform: translateX(-50%); cursor: ns-resize; }
    .resize-handle.s { bottom: -6px; left: 50%; transform: translateX(-50%); cursor: ns-resize; }
    .resize-handle.w { top: 50%; left: -6px; transform: translateY(-50%); cursor: ew-resize; }
    .resize-handle.e { top: 50%; right: -6px; transform: translateY(-50%); cursor: ew-resize; }
    #button-bar {
      position: fixed;
      display: none;
      gap: 8px;
      z-index: 10001;
    }
    #button-bar.show {
      display: flex;
    }
    .btn {
      padding: 6px 16px;
      border: none;
      border-radius: 4px;
      font-family: sans-serif;
      font-size: 13px;
      cursor: pointer;
      pointer-events: auto;
    }
    .btn-confirm {
      background: #3b82f6;
      color: #fff;
    }
    .btn-confirm:hover {
      background: #2563eb;
    }
    .btn-cancel {
      background: rgba(255, 255, 255, 0.9);
      color: #333;
    }
    .btn-cancel:hover {
      background: #fff;
    }
    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      font-family: sans-serif;
      font-size: 14px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 10000;
    }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: monospace;
      font-size: 16px;
      z-index: 10001;
    }
    </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="selection">
    <div class="resize-handle nw" data-handle="nw"></div>
    <div class="resize-handle ne" data-handle="ne"></div>
    <div class="resize-handle sw" data-handle="sw"></div>
    <div class="resize-handle se" data-handle="se"></div>
    <div class="resize-handle n" data-handle="n"></div>
    <div class="resize-handle s" data-handle="s"></div>
    <div class="resize-handle w" data-handle="w"></div>
    <div class="resize-handle e" data-handle="e"></div>
  </div>
  <div id="selection-dimensions"></div>
  <div id="button-bar">
    <button class="btn btn-confirm" id="btn-confirm"></button>
    <button class="btn btn-cancel" id="btn-cancel"></button>
  </div>
  <div id="hint"></div>
  <script type="module" src="./src/screenshot.ts"></script>
</body>
</html>
