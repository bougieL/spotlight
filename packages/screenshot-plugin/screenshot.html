<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
      overflow: hidden;
      outline: none;
      background: transparent;
      user-select: none;
    }
    body {
      tab-index: -1;
    }
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      background: transparent;
    }
    #selection {
      position: fixed;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(0, 0, 0, 0.5);
      pointer-events: none;
      z-index: 9999;
      display: none;
    }
    #selection.show {
      display: block;
    }
    #selection-dimensions {
      position: fixed;
      padding: 4px 8px;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      font-family: monospace;
      font-size: 12px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 10000;
      display: none;
    }
    #selection-dimensions.show {
      display: block;
    }
    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      font-family: sans-serif;
      font-size: 14px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 10000;
    }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: monospace;
      font-size: 16px;
      z-index: 10001;
    }
    </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="selection"></div>
  <div id="selection-dimensions"></div>
  <div id="hint"></div>
  <script type="module" src="./src/screenshot.ts"></script>
</body>
</html>
