<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
      overflow: hidden;
      outline: none;
      background: transparent;
    }
    body {
      tab-index: -1;
    }
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      background: transparent;
    }
    #crosshair {
      position: fixed;
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5);
      z-index: 9999;
    }
    #info {
      position: fixed;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      font-family: monospace;
      font-size: 14px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 10000;
      display: none;
    }
    #info.show {
      display: block;
    }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: monospace;
      font-size: 16px;
      z-index: 10001;
    }
    </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="crosshair"></div>
  <div id="info"></div>
  <div id="loading">Capturing...</div>
  <script type="module" src="/src/plugins/color-picker-plugin/colorPicker.ts"></script>
</body>
</html>
